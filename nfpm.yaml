name: "rnctl"
arch: "amd64"
platform: "linux"
version: "v1.0.0"
section: "utils"
priority: "optional"
maintainer: "astralcynsm <astralcynsm@gmail.com>"
description: |
  rnctl - Remote Network Control Tool
  ZimaOS 局域网与远程设备管理利器
vendor: "astralcynsm"
homepage: "https://github.com/astralcynsm/rnctl"
license: "MIT"

contents:
  - src: ./build/bin/rnctl
    dst: /usr/local/bin/rnctl
    file_info:
      mode: 0755

  - src: ./rnctl.desktop
    dst: /usr/share/applications/rnctl.desktop
    file_info:
      mode: 0644

  - src: ./polkit/rnctl-sudoers
    dst: /usr/share/rnctl/rnctl-sudoers
    file_info:
      mode: 0644

scripts:
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/preremove.sh
